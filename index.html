<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IUB - Help Desk</title>
    <link rel="stylesheet" href="style.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
</head>
<body>

<body>

<div class="container">
    <div class="row justify-content-center mt-5">
        <div class="col-md-4">
            <div class="card shadow">
                <div class="card-body p-4">

                    <h2 class="text-center text-primary fw-bold">IUB</h2>
                    <h6 class="text-center text-muted mb-4">Islamia University of Bahawalpur<br>Online Help Desk Portal</h6>

                    <form id="loginForm">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Roll No*</label>
                            <input type="text" class="form-control" id="rollNumber" autocomplete="off" placeholder="e.g. F24BSCS1M0001" required/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Password*</label>
                            <input type="password" class="form-control" id="pwd" autocomplete="off" required/>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Login</button>
                    </form>

                </div>
            </div>
        </div>
    </div>
</div>

<script src="login.js"></script>
</body>
